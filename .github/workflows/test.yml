name: Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  orchestrator-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        working-directory: platform/orchestrator
        run: npm ci
      - name: Run tests
        working-directory: platform/orchestrator
        run: npm test
